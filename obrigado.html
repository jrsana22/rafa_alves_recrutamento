<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro Realizado!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0a0a0f;
      --bg-card: #16161e;
      --border: rgba(255,255,255,0.08);
      --text-primary: #f1f0f5;
      --text-secondary: #9d9cb0;
      --text-muted: #5c5b6e;
      --green: #10b981;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      top: -20%;
      left: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(16,185,129,0.08) 0%, transparent 70%);
      border-radius: 50%;
    }
    .bg-glow::after {
      content: '';
      position: absolute;
      bottom: -10%;
      right: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
      border-radius: 50%;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 520px;
      width: 90%;
      text-align: center;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, #10b981, #6366f1, #06b6d4);
    }

    .check-circle {
      width: 72px;
      height: 72px;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes pop {
      0%   { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 12px;
    }

    p strong {
      color: var(--text-primary);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      color: #34d399;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 100px;
      margin-top: 24px;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="card">
  <div class="check-circle">✅</div>
  <h1>Cadastro realizado!</h1>
  <p>
    <strong>Rafa Alves</strong> acabou de fazer contato pelo WhatsApp informado.
  </p>
  <p>
    Fique de olho nas mensagens — a resposta chega em instantes.
  </p>
  <div class="badge">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none">

    Mensagem enviada para o seu WhatsApp
  </div>
</div>

</body>
</html>
