<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧪 TESTE MODAL APENAS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #0a0a0f;
      --bg-card: #16161e;
      --border: rgba(255,255,255,0.08);
      --text-primary: #f1f0f5;
      --text-secondary: #9d9cb0;
      --text-muted: #5c5b6e;
      --accent: #6366f1;
      --accent-2: #8b5cf6;
      --radius: 12px;
      --radius-lg: 20px;
    }

    html { scroll-behavior: auto; }
    html, body { overflow-x: hidden; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px;
      position: relative;
      overflow: hidden;
    }

    .form-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, #6366f1, #8b5cf6, #06b6d4);
    }

    .form-header {
      margin-bottom: 28px;
    }

    .form-header h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .form-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    label .required {
      color: #ef4444;
      margin-left: 3px;
    }

    input, select {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      outline: none;
      -webkit-appearance: none;
    }

    input::placeholder { color: var(--text-muted); }

    input:focus, select:focus {
      border-color: var(--accent);
      background: rgba(99,102,241,0.06);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }

    .phone-wrapper {
      display: flex;
      gap: 10px;
    }

    .ddi-select {
      width: 110px;
      flex-shrink: 0;
    }

    .phone-wrapper input {
      flex: 1;
    }

    .btn-submit {
      width: 100%;
      padding: 15px 24px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      box-shadow: 0 4px 20px rgba(99,102,241,0.3);
    }

    .btn-submit:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(99,102,241,0.4);
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.visible { display: flex; }

    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      max-width: 420px;
      text-align: center;
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-icon {
      width: 56px;
      height: 56px;
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 24px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .modal-description {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .modal-number {
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 18px;
      font-weight: 700;
      color: #a5b4fc;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .modal-btn:active { transform: scale(0.98); }

    .modal-btn-cancel {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .modal-btn-cancel:hover { opacity: 0.8; }

    .modal-btn-confirm {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .modal-btn-confirm:hover { opacity: 0.92; }

    .test-badge {
      display: inline-block;
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 20px;
    }

  </style>
</head>
<body>

<div class="page-wrapper">
  <div class="form-card">
    <div class="test-badge">🧪 MODO TESTE — Sem enviar dados</div>

    <div class="form-header">
      <h2>Teste do Modal</h2>
      <p>Preencha o WhatsApp e clique no botão para testar o modal de confirmação</p>
    </div>

    <form id="lead-form" novalidate>
      <div class="form-group">
        <label for="nome">Seu nome completo <span class="required">*</span></label>
        <input
          type="text"
          id="nome"
          name="nome"
          placeholder="Ex: Rafael Sousa"
          autocomplete="name"
          required
        />
      </div>

      <div class="form-group">
        <label for="email">E-mail <span class="required">*</span></label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Ex: seu@email.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="whatsapp">WhatsApp <span class="required">*</span></label>
        <div class="phone-wrapper">
          <select class="ddi-select" id="ddi" name="ddi">
            <option value="+55">🇧🇷 +55</option>
          </select>
          <input
            type="tel"
            id="whatsapp"
            name="whatsapp"
            placeholder="(71) 99999-9999"
            autocomplete="tel"
            required
          />
        </div>
      </div>

      <button type="submit" class="btn-submit">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z" fill="white"/>
        </svg>
        Quero participar — Entrar em contato
      </button>

    </form>
  </div>
</div>

<!-- MODAL DE CONFIRMAÇÃO DE WHATSAPP -->
<div class="modal-overlay" id="modal-whatsapp">
  <div class="modal-content">
    <div class="modal-icon">📱</div>
    <div class="modal-title">Seu WhatsApp tá correto?</div>
    <div class="modal-description">
      Confirme o número abaixo para continuarmos
    </div>
    <div class="modal-number" id="modal-number-display">
      +55 (71) 99999-9999
    </div>
    <div class="modal-buttons">
      <button type="button" class="modal-btn modal-btn-cancel" id="modal-cancel">Corrigir</button>
      <button type="button" class="modal-btn modal-btn-confirm" id="modal-confirm">Confirmar</button>
    </div>
  </div>
</div>

<script>
  // ── Máscara de telefone ──
  const phoneInput = document.getElementById('whatsapp');
  phoneInput.addEventListener('input', function () {
    let v = this.value.replace(/\D/g, '').slice(0, 11);
    if (v.length > 6)      v = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
    else if (v.length > 2) v = `(${v.slice(0,2)}) ${v.slice(2)}`;
    else if (v.length > 0) v = `(${v}`;
    this.value = v;
  });

  // ── Form submit ──
  const form             = document.getElementById('lead-form');
  const btnSubmit        = form.querySelector('.btn-submit');
  const modal            = document.getElementById('modal-whatsapp');
  const modalCancel      = document.getElementById('modal-cancel');
  const modalConfirm     = document.getElementById('modal-confirm');
  const modalNumberDisplay = document.getElementById('modal-number-display');
  const successMsg       = document.getElementById('success-msg');

  form.addEventListener('submit', async function (e) {
    e.preventDefault();

    const nome     = document.getElementById('nome').value.trim();
    const email    = document.getElementById('email').value.trim();
    const whatsapp = document.getElementById('whatsapp').value.trim();

    if (!nome || !email || !whatsapp) {
      alert('Por favor, preencha todos os campos obrigatórios.');
      return;
    }

    // Formata número com DDI para exibição
    const phoneFormatted = '+55 ' + whatsapp;
    modalNumberDisplay.textContent = phoneFormatted;

    // Mostra modal
    modal.classList.add('visible');
  });

  // ── Cancelar confirmação ──
  modalCancel.addEventListener('click', function () {
    modal.classList.remove('visible');
    document.getElementById('whatsapp').focus();
  });

  // ── Confirmar (SEM ENVIAR NADA) ──
  modalConfirm.addEventListener('click', function () {
    modal.classList.remove('visible');
  });
</script>

</body>
</html>
