<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste Webhook</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0f;
      color: #f1f0f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #16161e;
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 12px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 30px;
      text-align: center;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: #9d9cb0;
    }
    input, select {
      width: 100%;
      padding: 12px;
      background: #0a0a0f;
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 8px;
      color: #f1f0f5;
      font-family: inherit;
      font-size: 14px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: opacity 0.2s;
      margin-top: 10px;
    }
    button:hover {
      opacity: 0.9;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      display: none;
    }
    .status.success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.5);
      color: #10b981;
      display: block;
    }
    .status.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.5);
      color: #ef4444;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Teste Webhook</h1>

    <form id="testForm">
      <div class="form-group">
        <label for="name">Nome</label>
        <input type="text" id="name" value="Maria Teste" required />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" value="teste@email.com" required />
      </div>

      <div class="form-group">
        <label for="phone">WhatsApp</label>
        <input type="text" id="phone" value="+55 (71) 99123-4567" required />
      </div>

      <div class="form-group">
        <label for="ocupacao">Ocupação</label>
        <input type="text" id="ocupacao" value="Autônomo" required />
      </div>

      <div class="form-group">
        <label for="cidade">Cidade</label>
        <input type="text" id="cidade" value="Salvador, BA" required />
      </div>

      <div class="form-group">
        <label for="data">Data</label>
        <input type="text" id="data" value="03/04/2026" required />
      </div>

      <button type="submit" id="btnEnviar">Enviar pro Webhook</button>
    </form>

    <div class="status" id="status"></div>
  </div>

  <script>
    const form = document.getElementById('testForm');
    const status = document.getElementById('status');
    const btnEnviar = document.getElementById('btnEnviar');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      btnEnviar.disabled = true;
      btnEnviar.textContent = 'Enviando...';
      status.className = 'status';
      status.textContent = '';

      const payload = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        ocupacao: document.getElementById('ocupacao').value,
        cidade: document.getElementById('cidade').value,
        data: document.getElementById('data').value
      };

      try {
        const response = await fetch('https://webhook.dev.solucoesdeia.com/webhook/rafa_leads_recrutamento', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        status.className = 'status success';
        status.textContent = '✅ Dados enviados com sucesso!';
        console.log('Response:', response);
        console.log('Payload:', payload);

      } catch (err) {
        status.className = 'status error';
        status.textContent = '❌ Erro ao enviar: ' + err.message;
        console.error('Erro:', err);
      } finally {
        btnEnviar.disabled = false;
        btnEnviar.textContent = 'Enviar pro Webhook';
      }
    });
  </script>
</body>
</html>
